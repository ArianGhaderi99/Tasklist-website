{% extends 'base/base.html' %}
{% load static %}
{% block title %}{% if form.instance.pk %}Edit Task{% else %}New Task{% endif %}{% endblock %}


{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>{% if form.instance.pk %}Edit Task{% else %}Add New Task{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Title *</label>
            <input type="text" name="title" value="{{ form.title.value|default:'' }}" class="form-control" required>
        </div>
        <div class="form-group">
            <label>End date</label>
            <input type="date" name="end_date" value="{{ form.end_date.value|date:'Y-m-d'|default:'' }}" class="form-control">
        </div>
        <div class="form-group">
            <label>End time</label>
            <input type="time" name="end_time" value="{{ form.end_time.value|time:'H:i'|default:'' }}" class="form-control">
        </div>
        <button type="submit" class="btn">Save</button>
        <a href="{% url 'task:task_list' %}" class="btn btn-outline">Cancel</a>
    </form>
</div>
{% endblock %}
